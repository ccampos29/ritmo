<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1d" />
  <title>Ritmo - Grupos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #0a0f1d;
      --bg-2: #0e1426;
      --card: rgba(18,24,39,0.96);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --stroke: rgba(255,255,255,0.16);
    }
    html, body {
      min-height: 100%;
      background: linear-gradient(180deg, var(--bg-2), var(--bg));
      color: var(--text);
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }
    body {
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      font-family: "Space Grotesk", "Inter", system-ui, sans-serif;
    }
    .glass-card {
      background: var(--card);
      border: 1px solid var(--stroke);
    }
    .pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
    }
    input, button {
      font-size: 16px;
    }
  </style>
</head>
<body>
  <main class="max-w-3xl mx-auto px-4 py-6 sm:py-8">
    <header class="flex items-center justify-between mb-4">
      <div>
        <p class="uppercase tracking-[0.28em] text-xs text-slate-400">Ritmo</p>
        <h1 class="text-2xl sm:text-3xl font-semibold">Gestion de grupos</h1>
      </div>
      <a href="index.html" class="pill px-3 py-2 text-sm">Volver</a>
    </header>

    <section class="glass-card rounded-2xl p-4 sm:p-5 mb-4">
      <h2 class="text-lg font-semibold mb-1">Nuevo grupo</h2>
      <p class="text-sm text-slate-400 mb-4">Los grupos se cargan automaticamente en el formulario de crear tarea.</p>
      <form id="groupForm" class="grid grid-cols-1 sm:grid-cols-[1fr_120px_auto] gap-3">
        <input id="groupName" required maxlength="24" class="w-full glass-card rounded-xl px-3 py-2" placeholder="Ej. Bienestar" />
        <input id="groupColor" type="color" value="#7cf8d3" class="w-full h-11 rounded-xl border border-white/15 bg-transparent p-1" />
        <div class="flex gap-2">
          <button id="groupSave" class="px-4 py-2 rounded-xl bg-emerald-400 text-slate-900 font-semibold">Guardar</button>
          <button id="groupCancel" type="button" class="px-4 py-2 rounded-xl pill hidden">Cancelar</button>
        </div>
      </form>
      <p id="groupMsg" class="text-xs text-slate-400 mt-3"></p>
    </section>

    <section class="glass-card rounded-2xl p-4 sm:p-5">
      <h2 class="text-lg font-semibold mb-3">Lista de grupos</h2>
      <div id="groupsList" class="space-y-2"></div>
    </section>
  </main>

  <script>
    const storageKey = 'ritmo_groups';
    const tasksKey = 'ritmo_tasks';
    const list = document.getElementById('groupsList');
    const form = document.getElementById('groupForm');
    const nameInput = document.getElementById('groupName');
    const colorInput = document.getElementById('groupColor');
    const saveBtn = document.getElementById('groupSave');
    const cancelBtn = document.getElementById('groupCancel');
    const msg = document.getElementById('groupMsg');
    let editingId = null;
    let groups = loadGroups();

    function defaultGroups() {
      return [
        { id: 'wellness', name: 'Bienestar', color: '#7cf8d3' },
        { id: 'work', name: 'Trabajo', color: '#a8c5ff' },
        { id: 'morning', name: 'Mananas', color: '#ffa8c5' }
      ];
    }

    function loadGroups() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (raw) return JSON.parse(raw);
        const seeded = defaultGroups();
        localStorage.setItem(storageKey, JSON.stringify(seeded));
        return seeded;
      } catch (e) {
        return defaultGroups();
      }
    }

    function saveGroups() {
      localStorage.setItem(storageKey, JSON.stringify(groups));
    }

    function loadTasks() {
      try {
        const raw = localStorage.getItem(tasksKey);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function countTasks(group) {
      const tasks = loadTasks();
      return tasks.filter(task => {
        if (task.groupId) return task.groupId === group.id;
        return (task.group || '').toLowerCase() === group.name.toLowerCase();
      }).length;
    }

    function setMessage(text) {
      msg.textContent = text || '';
    }

    function startCreateMode() {
      editingId = null;
      saveBtn.textContent = 'Guardar';
      cancelBtn.classList.add('hidden');
      nameInput.value = '';
      colorInput.value = '#7cf8d3';
      setMessage('');
    }

    function render() {
      list.innerHTML = '';
      if (groups.length === 0) {
        list.innerHTML = '<p class="text-sm text-slate-400">No hay grupos creados.</p>';
        return;
      }

      const frag = document.createDocumentFragment();
      groups.forEach(group => {
        const row = document.createElement('article');
        row.className = 'glass-card rounded-xl p-3 flex items-center justify-between gap-3';
        row.innerHTML = `
          <div class="min-w-0 flex items-center gap-3">
            <span class="w-5 h-5 rounded-sm border border-white/20 shrink-0" style="background:${group.color}"></span>
            <div class="min-w-0">
              <p class="font-semibold truncate">${group.name}</p>
              <p class="text-xs text-slate-400">${countTasks(group)} tareas asociadas</p>
            </div>
          </div>
          <div class="flex gap-2 shrink-0">
            <button class="pill px-3 py-1 text-sm" data-action="edit" data-id="${group.id}">Editar</button>
            <button class="px-3 py-1 text-sm rounded-md bg-red-700/85 text-white" data-action="delete" data-id="${group.id}">Eliminar</button>
          </div>
        `;
        frag.appendChild(row);
      });
      list.appendChild(frag);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const color = colorInput.value;
      if (!name) return;

      const exists = groups.some(group =>
        group.name.toLowerCase() === name.toLowerCase() && group.id !== editingId
      );
      if (exists) {
        setMessage('Ya existe un grupo con ese nombre.');
        return;
      }

      if (editingId) {
        const idx = groups.findIndex(group => group.id === editingId);
        if (idx >= 0) groups[idx] = { ...groups[idx], name, color };
        setMessage('Grupo actualizado.');
      } else {
        groups.push({ id: crypto.randomUUID(), name, color });
        setMessage('Grupo creado.');
      }

      saveGroups();
      render();
      startCreateMode();
    });

    cancelBtn.addEventListener('click', startCreateMode);

    list.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      const group = groups.find(item => item.id === id);
      if (!group) return;

      if (action === 'edit') {
        editingId = id;
        nameInput.value = group.name;
        colorInput.value = group.color;
        saveBtn.textContent = 'Actualizar';
        cancelBtn.classList.remove('hidden');
        setMessage('');
        return;
      }

      if (groups.length <= 1) {
        setMessage('Debes conservar al menos un grupo.');
        return;
      }

      const ok = window.confirm(`Eliminar grupo "${group.name}"?`);
      if (!ok) return;
      groups = groups.filter(item => item.id !== id);
      saveGroups();
      render();
      startCreateMode();
      setMessage('Grupo eliminado.');
    });

    startCreateMode();
    render();
  </script>
</body>
</html>
